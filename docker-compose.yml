services:
  enlil:
    build: .
    env_file: .env
    ports:
      - "8002:8002"
    volumes:
      - ./data:/app/data
    environment:
      - ENLIL_DB=/app/data/enlil.db
    depends_on:
      - qdrant

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
